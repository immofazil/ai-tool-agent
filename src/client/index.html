<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production AI Agent Client</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f5; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat-container { width: 100%; max-width: 650px; background: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 1.5rem; }
        .header { border-bottom: 1px solid #e4e4e7; padding-bottom: 1rem; margin-bottom: 1rem; }
        .header h2 { font-size: 1.3rem; color: #18181b; margin-bottom: 0.25rem; }
        .header p { font-size: 0.85rem; color: #71717a; }
        .auth-box { margin-bottom: 1rem; }
        .auth-box label { display: block; font-size: 0.75rem; font-weight: 600; color: #52525b; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .auth-box input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d4d4d8; border-radius: 6px; font-size: 0.9rem; outline: none; }
        .chat-box { height: 380px; overflow-y: auto; border: 1px solid #e4e4e7; border-radius: 6px; padding: 1rem; background: #fafafa; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { padding: 0.75rem 1rem; border-radius: 8px; max-width: 85%; line-height: 1.45; font-size: 0.95rem; word-break: break-word; }
        .msg.user { background: #2563eb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.bot { background: #e4e4e7; color: #18181b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; align-self: center; width: 100%; text-align: center; font-size: 0.85rem; }
        .badge { display: inline-block; font-size: 0.75rem; background: #dcfce7; color: #15803d; padding: 3px 8px; border-radius: 12px; margin-bottom: 6px; font-weight: 600; }
        .input-area { display: flex; gap: 0.5rem; }
        .input-area input { flex: 1; padding: 0.65rem 0.8rem; border: 1px solid #d4d4d8; border-radius: 6px; font-size: 0.95rem; outline: none; }
        .input-area button { padding: 0.65rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .input-area button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>Hardened AI Agent Client</h2>
        <p>FastAPI Gateway + SQLite Memory + MCP Tool Execution</p>
    </div>

    <div class="auth-box">
        <label for="bearer-token">Bearer Authentication Token</label>
        <input type="password" id="bearer-token" value="capstone-secret-token" placeholder="Enter Bearer Token">
    </div>

    <!-- Chat Display Area -->
    <div class="chat-box" id="chat-box"></div>

    <!-- Strictly NO <form> tags here to prevent browser auto-reload -->
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message (e.g., 'weather in Dubai')..." autocomplete="off">
        <button type="button" id="send-btn" onclick="sendMessage(event)">Send</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
